services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: betterlabs-api
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      # Keep SQLite and artifacts on the same named volume for easy backups.
      ARTIFACTS_BASE: /app/data/artifacts
      # Context/ is bind-mounted in from the host.
      CONTEXT_BASE: /app/Context
    volumes:
      # Persistent SQLite + artifact store. Survives container rebuilds.
      - api_data:/app/data
      # Context/ on host → read-only mount so users can drop .md files.
      - ./Context:/app/Context:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: betterlabs-web
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Vite proxy target for /api/* inside the compose network.
      VITE_API_URL: http://api:8000
    restart: unless-stopped

volumes:
  api_data:
